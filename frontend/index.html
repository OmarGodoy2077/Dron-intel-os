<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart-Swarm · Neuro-Simbólico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: #07090d; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(125,211,252,0.18); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    input[type=range] { cursor: pointer; }
    button { cursor: pointer; font-family: inherit; }
  </style>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
