[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    prolog: tests que requieren SWI-Prolog + pyswip instalados (se omiten si no están)
    integration: tests de integración entre múltiples módulos
    slow: tests que ejecutan pasos de aprendizaje (más lentos)
filterwarnings =
    ignore::DeprecationWarning
